<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="color-scheme" content="light dark">
  <meta name="application-version" content="">
  <meta name="description" content="先选用餐类型，再决定具体吃什么；大类在24小时内不会重复。">
  <title>今天吃什么</title>
  <link rel="stylesheet" href="styles.css?v=2.0.0">
  <script src="version.js?v=2.0.0" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <a class="portal-link" href="https://easonxavier.github.io/" aria-label="返回 Eason's Tools 门户">
          <span class="portal-mark" aria-hidden="true"><span></span><span></span><span></span></span>
          <span>Eason's Tools</span>
        </a>
        <p class="section-kicker">Daily meal picker</p>
        <h1>今天吃什么</h1>
        <p class="brand-subtitle">不纠结，交给它。</p>
      </div>
      <div class="header-actions">
        <span class="app-version" data-app-version></span>
        <button id="themeToggle" class="icon-button" type="button" aria-label="切换明暗模式" title="切换明暗模式">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <main>
      <section class="decision-card" aria-labelledby="resultLabel">
        <div class="decision-glow" aria-hidden="true"></div>
        <div class="status-pill">大类抽中过后，24 小时内不再重复</div>
        <p id="resultLabel" class="result-label">这顿吃</p>
        <p id="categoryResult" class="category-result" hidden></p>
        <div id="result" class="result" aria-live="polite">点一下，马上决定</div>
        <p id="resultMeta" class="result-meta">先选一个类型，再选具体吃什么。</p>
        <div class="decision-actions">
          <button id="pickButton" class="primary-button" type="button">帮我选一个</button>
          <button id="undoButton" class="plain-button" type="button" hidden>撤回这次</button>
        </div>
        <p id="availabilityNote" class="availability-note"></p>
      </section>

      <section class="panel menu-panel" aria-labelledby="optionsTitle">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">Your menu</p>
            <h2 id="optionsTitle">我的菜单</h2>
            <p id="categorySummary" class="panel-description"></p>
          </div>
          <button id="resetButton" class="secondary-button" type="button">恢复默认</button>
        </div>

        <div class="menu-tools">
          <form id="addCategoryForm" class="add-form">
            <label class="sr-only" for="newCategory">新建大类</label>
            <input id="newCategory" name="newCategory" type="text" maxlength="30" autocomplete="off" placeholder="新建一个大类，例如：粉面">
            <button class="secondary-button" type="submit">添加</button>
          </form>

          <div class="transfer-card">
            <div>
              <h3>导入或导出</h3>
              <p>换设备、交给 AI 调整，或者留一份备份。</p>
            </div>
            <div class="transfer-actions">
              <button id="exportButton" class="secondary-button" type="button">导出列表</button>
              <label class="secondary-button file-button" for="importFile">
                导入列表
                <input id="importFile" type="file" accept=".txt,text/plain">
              </label>
            </div>
            <p id="importStatus" class="transfer-status" role="status" aria-live="polite"></p>
          </div>
        </div>

        <div id="emptyState" class="empty-state" hidden>
          这里还是空的。先建一个大类，再往里面加几个想吃的选项。
        </div>
        <div id="categoryList" class="category-list" aria-label="菜单分类"></div>
      </section>

      <section class="panel history-panel" aria-labelledby="historyTitle">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">Recent picks</p>
            <h2 id="historyTitle">最近选过</h2>
          </div>
          <button id="clearHistoryButton" class="plain-button" type="button">清空</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
        <p id="historyEmpty" class="empty-copy">还没有记录。</p>
      </section>
    </main>

    <footer>
      列表只保存在这台设备的浏览器里。抽中过的大类，24 小时内会自动跳过。
    </footer>
  </div>

  <template id="categoryTemplate">
    <article class="category-card">
      <div class="category-heading">
        <div>
          <h3 class="category-name"></h3>
          <p class="category-count"></p>
        </div>
        <button class="remove-button delete-category-button" type="button">移除</button>
      </div>
      <ul class="subitem-list"></ul>
      <p class="category-empty">还没有具体选项，这个大类暂时不会参与抽取。</p>
      <form class="add-item-form">
        <label class="sr-only">添加具体选项</label>
        <input class="new-subitem" type="text" maxlength="40" autocomplete="off" placeholder="加一个想吃的选项">
        <button class="compact-button" type="submit">加入</button>
      </form>
    </article>
  </template>

  <template id="subitemTemplate">
    <li class="item-row">
      <span class="item-name"></span>
      <button class="remove-button" type="button">删除</button>
    </li>
  </template>

  <script src="default-list.js?v=2.0.0" defer></script>
  <script src="app.js?v=2.0.0" defer></script>
  <script src="ipad-export-fix.js?v=2.0.0" defer></script>
</body>
</html>
